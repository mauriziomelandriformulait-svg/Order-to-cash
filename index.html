<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Workflow Order-to-Cash</title>
    <style>
        html { overflow-x: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        a { text-decoration: none; color: inherit; cursor: pointer; }
        .workflow-container { max-width: 1450px; width: 100%; display: flex; flex-direction: column; gap: 30px; }
        .main-dashboard-content { display: flex; flex-direction: row; align-items: start; gap: 20px; width: 100%; justify-content: center; }
        .grid-wrapper { display: flex; flex-direction: column; }
        .otc-header-container { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; padding-left: 270px; }
        .otc-title { width: 570px; text-align: left; font-size: 18px; font-weight: 500; color: #1e293b; padding-bottom: 10px; border-bottom: 2px solid #FDB913; }
        
        .input-card, .flow-card, .sub-card, .status-card, .powerbi-label, .sub-card-wide { 
            box-shadow: none !important; font-weight: 700; border: 1px solid #cbd5e1;
            border-bottom: 3px solid #FDB913 !important; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .column-container { display: flex; flex-direction: column; gap: 10px; align-items: center; height: 100%; }
        .align-bottom { justify-content: flex-end; }
        .input-block-container { display: flex; flex-direction: column; align-items: center; width: 170px; margin-bottom: 5px; }
        .top-inputs-wrapper { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; }
        
        .card-icon { width: 20px; height: 20px; margin-bottom: 3px; color: #1e293b; }
        .fan-arrows { display: flex; gap: 80px; color: #94a3b8; font-size: 20px; font-weight: bold; margin-top: 5px; }
        .vertical-arrow { font-size: 20px; color: #94a3b8; font-weight: bold; margin: -5px 0; }
        
        .input-card { background: white; border-radius: 6px; padding: 5px; width: 80px; height: 60px; text-align: center; font-size: 9px; }
        .flow-card { background: white; border-radius: 8px; padding: 10px; width: 170px; height: 80px; gap: 5px; text-align: center; font-size: 12px; }
        .sub-cards-row { display: flex; gap: 10px; }
        .sub-card { background: white; border-radius: 6px; padding: 5px; width: 80px; height: 55px; text-align: center; font-size: 9px; gap: 2px; }
        .sub-card-wide { background: white; border-radius: 6px; padding: 5px; width: 170px; height: 50px; text-align: center; font-size: 12px; gap: 2px; }
        .status-card { background: white; border-radius: 6px; padding: 5px; width: 170px; height: 50px; text-align: center; font-size: 12px; gap: 2px; }
        
        .grid-flow-layout { display: grid; grid-template-columns: auto 50px auto 50px auto 50px auto; align-items: start; justify-items: center; gap: 10px; }
        .arrow-connector { display: flex; justify-content: center; align-items: center; align-self: center; height: 70px; }
        .arrow-svg { stroke: #FDB913; stroke-width: 1.5; fill: none; width: 40px; }
        .powerbi-side-panel { display: flex; flex-direction: column; gap: 15px; background: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; width: 220px; border-radius: 8px; }
        .powerbi-label { background: white; border-radius: 6px; padding: 12px; font-size: 12px; text-align: center; display: block; border-bottom: 3px solid #FDB913 !important; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
    <div class="workflow-container">
        <div class="main-dashboard-content">
            <div class="grid-wrapper">
                <div class="otc-header-container">
                    <div class="otc-title">Order-to-Cash</div>
                </div>
                
                <div class="grid-flow-layout">
                    <!-- Colonna 1 -->
                    <div class="column-container">
                        <div class="input-block-container">
                            <div class="top-inputs-wrapper">
                                <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/subjectListAnid/1')" class="input-card">
                                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="1.5"/></svg>
                                    Cliente
                                </a>
                                <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/dnow2/OCPV/1')" class="input-card">
                                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2-1.343-2-3-2zM12 12v6m0 0l-2-2m2 2l2-2" stroke-width="1.5"/></svg>
                                    Provv.
                                </a>
                            </div>
                            <div class="fan-arrows"><span>↖</span><span>↗</span></div>
                        </div>
                        <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/salesOrder/1')" class="flow-card">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-width="1.5"/></svg>
                            Offerte
                        </a>
                        <div class="sub-cards-row">
                            <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/discounts/1')" class="sub-card">
                                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 7h.01M7 13h.01M7 19h.01M17 7h.01M17 13h.01M17 19h.01" stroke-width="1.5"/></svg>Sconti
                            </a>
                            <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/salescampaigns/1')" class="sub-card">
                                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.148-6.15M18 13a3 3 0 100-6M5 5h14" stroke-width="1.5"/></svg>Campagne
                            </a>
                        </div>
                    </div>
                    
                    <div class="arrow-connector"><svg viewBox="0 0 40 10" class="arrow-svg"><line x1="0" y1="5" x2="35" y2="5"/><polygon points="35,5 30,2 30,8" fill="#FDB913"/></svg></div>
                    
                    <!-- Colonna 2 -->
                    <div class="column-container align-bottom">
                        <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/salesOrder/1')" class="flow-card">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="1.5"/></svg>
                            Gestione Ordine
                        </a>
                        <div class="vertical-arrow">↓</div>
                        <div class="sub-card-wide"><svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="1.5"/></svg>Order Tools</div>
                    </div>
                    
                    <div class="arrow-connector"><svg viewBox="0 0 40 10" class="arrow-svg"><line x1="0" y1="5" x2="35" y2="5"/><polygon points="35,5 30,2 30,8" fill="#FDB913"/></svg></div>
                    
                    <!-- Colonna 3 -->
                    <div class="column-container align-bottom">
                        <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/salesOrder/1')" class="flow-card">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="1.5"/></svg>
                            Conferma Ordine
                        </a>
                        <div class="vertical-arrow">↓</div>
                        <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/dwa_oc_sh_fa/1')" class="sub-card-wide"><svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="1.5"/></svg>Tracking</a>
                    </div>
                    
                    <div class="arrow-connector"><svg viewBox="0 0 40 10" class="arrow-svg"><line x1="0" y1="5" x2="35" y2="5"/><polygon points="35,5 30,2 30,8" fill="#FDB913"/></svg></div>
                    
                    <!-- Colonna 4 -->
                    <div class="column-container align-bottom">
                        <a onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/workArea/dnow2/SHPS/1')" class="flow-card">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" stroke-width="1.5"/></svg>
                            Passaggio a WMS
                        </a>
                        <div class="vertical-arrow">↓</div>
                        <div class="status-card"><svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="1.5"/></svg>Status</div>
                    </div>
                </div>
            </div>

            <!-- Analytics (Invariato) -->
            <div class="powerbi-side-panel">
                <div style="font-size: 10px; font-weight: bold; color: #64748b; text-align: center; margin-bottom: 5px;">ANALYTICS REPORTS</div>
                <a href="https://app.powerbi.com/reportEmbed?reportId=60ae1b03-6d1b-4c0c-905d-ffc92cecb369&autoAuth=true&ctid=ba941aaf-4ef6-4eae-8cee-441f432b943a" target="_blank" class="powerbi-label">📊 Overview Vendite</a>
                <a href="https://app.powerbi.com/reportEmbed?reportId=60ae1b03-6d1b-4c0c-905d-ffc92cecb369&autoAuth=true&ctid=ba941aaf-4ef6-4eae-8cee-441f432b943a" target="_blank" class="powerbi-label">📈 Marginalità</a>
                <a href="https://app.powerbi.com/reportEmbed?reportId=60ae1b03-6d1b-4c0c-905d-ffc92cecb369&autoAuth=true&ctid=ba941aaf-4ef6-4eae-8cee-441f432b943a" target="_blank" class="powerbi-label">🌿 Sales Channel</a>
            </div>
        </div>
    </div>

    <script>
        function inviaMessaggioNavigazione(percorsoTarget) {
            let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
            const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
            window.parent.postMessage(payload, '*');
        }
    </script>
</body>
</html>
