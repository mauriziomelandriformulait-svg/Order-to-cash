<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Workflow Order-to-Cash</title>
    <style>
        html { overflow-x: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        a { text-decoration: none; color: inherit; }
        .workflow-container { max-width: 1450px; width: 100%; display: flex; flex-direction: column; gap: 30px; }
        .main-dashboard-content { display: flex; flex-direction: row; align-items: start; gap: 20px; width: 100%; justify-content: center; }
        .grid-wrapper { display: flex; flex-direction: column; }
        .otc-header-container { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; padding-left: 270px; }
        .otc-title { width: 570px; text-align: left; font-size: 18px; font-weight: 500; color: #1e293b; padding-bottom: 10px; border-bottom: 2px solid #FDB913; }

        .input-card, .flow-card, .sub-card, .status-card, .powerbi-label, .sub-card-wide { 
            box-shadow: none !important; font-weight: 700; border: 1px solid #cbd5e1;
            border-bottom: 3px solid #FDB913 !important; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .column-container { display: flex; flex-direction: column; gap: 10px; align-items: center; height: 100%; }
        .align-bottom { justify-content: flex-end; }
        .input-block-container { display: flex; flex-direction: column; align-items: center; width: 170px; margin-bottom: 5px; }
        .top-inputs-wrapper { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; }
        
        .card-icon { width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px; margin-bottom: 4px; }
        .fan-arrows { display: flex; gap: 80px; color: #94a3b8; font-size: 20px; font-weight: bold; margin-top: 5px; }
        .sub-fan-arrows { display: flex; gap: 40px; color: #94a3b8; font-size: 16px; font-weight: bold; margin-top: -5px; margin-bottom: -5px; }
        .vertical-arrow { font-size: 20px; color: #94a3b8; font-weight: bold; margin: -5px 0; }

        .input-card { background: white; border-radius: 6px; padding: 5px; width: 80px; height: 50px; text-align: center; font-size: 9px; }
        .flow-card { background: white; border-radius: 8px; padding: 15px; width: 170px; height: 70px; gap: 5px; text-align: center; font-size: 12px; }
        .sub-cards-row { display: flex; gap: 10px; }
        .sub-card { background: white; border-radius: 6px; padding: 8px; width: 80px; height: 40px; text-align: center; font-size: 9px; }
        .sub-card-wide { background: white; border-radius: 6px; padding: 8px; width: 170px; height: 40px; text-align: center; font-size: 12px; }
        .status-card { background: white; border-radius: 6px; padding: 8px; width: 170px; height: 40px; text-align: center; font-size: 12px; }
        
        .grid-flow-layout { display: grid; grid-template-columns: auto 50px auto 50px auto 50px auto; align-items: start; justify-items: center; gap: 10px; }
        .arrow-connector { display: flex; justify-content: center; align-items: center; align-self: center; height: 70px; }
        .arrow-svg { stroke: #FDB913; stroke-width: 1.5; fill: none; width: 40px; }
        .powerbi-side-panel { display: flex; flex-direction: column; gap: 15px; background: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; width: 220px; border-radius: 8px; }
        .powerbi-label { background: white; border-radius: 6px; padding: 12px; font-size: 12px; text-align: center; display: block; }
    </style>
</head>
